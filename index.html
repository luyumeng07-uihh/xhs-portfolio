31t080kael6005n2sa6gm6irdp359le0", "title": "“我在上课的时候转移了，而且是睁眼转”", "desc": "（cr：dustylullabies） 我在上课的时候转移了，而且是睁眼转 这真的就在前几天发生在我身上，我现在还挺震惊的。我坐在课堂上，半装作在听老师讲，突然间我就转移了。真的整个转移。睁。着。眼。睛。？？ \t 到目前为止，我只用过闭眼醒着的方法或者晚上睡觉的方法来转移。你知道的，那种“找个舒服的姿势，放松，沉进去”的常规流程。（其实根本不需要！！） 我当时真的就盯着白板发呆，恍神着，意识就突然滑走了？？就像切换频道一样。我根本没尝试。没数数、没自我暗示、没准备。前一秒我还在课堂，下一秒我就不在了。感觉有点像做了违法的事。 最好笑的是，老师大概以为我只是在白日梦。与此同时，我真的一只手拿着笔在变换现实。 但问题是，那次体验给了我一个很大的教训。转移并不脆弱。它不需要我们自以为的“完美条件”。它不是躺着一动不动等几个小时，或者小心翼翼地呵护过程。觉知并不在乎你是在夜里躺在床上，还是上午11点困在教室里。（相信我） 我在课堂上转移了。睁着眼睛转移。如果这还不明确地说明“你可以不用再等星象齐了再转移”，那我就不知道还有什么能说明了。 \t 提问者：你去了哪个DR？呆了多久？ dustylullabies：像是某种水下文明？？我只在那边呆了两天左右，因为这次转移完全出乎意料。不得不回到我的好闺闺身边 提问者：我的天这也太激动人心了，我还有个问题，你回来的时候时间是暂停了然后你还在上课？还是说别的？（抱歉我知道我问了太多问题） dustylullabies：哦请不要担心！！我创这个号就是来帮助大家的，问问题不会困扰我<3 OK所以当我平常转移的时候我总是在剧本里设定我会在床上醒来，这次也不例外:)) #转移[话题]# #shifting[话题]# #自行避雷[话题]#", "liked_count": "643", "collected_count": "231", "comment_count": "37", "share_count": "40", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111549/54035b0b5dc8f32289955559c97b27dc/1040g00831mjkqbqfku105n2sa6gm6ird3oijdl8!nd_dft_wlteh_webp_3']", "tags": "['转移', 'shifting', '自行避雷']", "upload_time": "2025-09-19 11:41:03", "ip_location": "未知"}, {"note_id": "68ccc1790000000012023211", "note_url": "https://www.xiaohongshu.com/explore/68ccc1790000000012023211?xsec_token=ABzWOqYnQWkKXtYic75Sw4ZcS02fKP53XNqGCa3PJtdUY=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "不要复杂化转移", "desc": "cr：cloverapple #转移[话题]# #shifting[话题]# #自行避雷[话题]#", "liked_count": "276", "collected_count": "103", "comment_count": "11", "share_count": "17", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111549/cb2b279e4d2dbe682ef76581229e20c2/1040g00831mjkqbqfku0g5n2sa6gm6irdjvrsrjo!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111549/94bd4efa449f08b11c851723fe4cf23c/1040g00831mjkqbqfku005n2sa6gm6irdokas63g!nd_dft_wlteh_webp_3']", "tags": "['转移', 'shifting', '自行避雷']", "upload_time": "2025-09-19 10:35:37", "ip_location": "未知"}, {"note_id": "68ccbb1d0000000012020e24", "note_url": "https://www.xiaohongshu.com/explore/68ccbb1d0000000012020e24?xsec_token=ABzWOqYnQWkKXtYic75Sw4ZWNwkPXNw9fQNNP9mky-LlI=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "转移到底有多真实？", "desc": "匿名提问者： 嗨 Cloverrrr \\:D 你最近那篇帖子（真的就是几分钟前发的，哈哈）对我太有帮助了！谢谢你！！！！ 我想请你谈一谈处在另一个现实里感觉到底有多真实。 现在我只是相信自己会不可避免地转移到我的 DR，我不需要做任何事。但因为一直只是维持那种信念却什么都没发生，我开始担心自己还没转移成功，是不是因为转移根本不真实，或者它只是类似清醒梦的东西。 我确实相信转移是真实的——你和这么多人没有理由撒谎——但我就是想不出还有什么其他原因解释为什么我还没转移成功 \t Cloverapple： 转移不幸地真实到你会像在这个现实里一样经历存在主义危机。那反过来又成为有趣的小现实检验，让你感觉就像在麦当劳游戏区的球池里突然获得意识的小孩。有一次我在主DR的凌晨两点站在俱乐部外面，马路对面有只巨大的老鼠正啃着一片薯片。我就站在那里朝着存在主义恐慌跌去，心想：“那只令人担忧地肥胖的老鼠完全不知道在无数其他现实里，无数其他的老鼠也在咀嚼无数其他的薯片。” ……然后去夜店玩依旧像在这个现实里那样在灵性上毫无满足感。 重点是，有时候生活在其他现实听起来好得不真实，是因为我们能参照的框架只有这个现实是终极、绝对的真理。这就像柏拉图的洞穴寓言。 你以为墙上的影子就是全部人生，但你转过身却发现其实有只巨大的、病态肥胖的老鼠弓着身子，把油腻的薯片当做圣餐一样吞噬着。 所以是的，我不能真的说服你相信转移是真的，但归根结底，即便你选择相信这全是谎言，也总会有一只像翻斗卡车那么大的啮齿动物在另一个现实里过着它最棒的生活，而你还在质疑你自己的现实。 这大概就是我在进了俱乐部、喝到烂醉、被人亲自拖回家的时候偶然得出的结论。当然，你也许希望我给出那种诗意的答案：转移真实到你会坠入爱河、撞到脚趾、打喷嚏打得鼻涕喷出来、因为蚊子像撒旦的礼物一样遍布各维度而用驱蚊剂把自己喷个满身、在每个时间线里为头痛吃布洛芬。但说实话，真相可以没那么光鲜，这反而让它更平常、更可被接受。 ……我觉得这回复可能没多大帮助。总之，那只老鼠超大。它有一只猫那么大。或者像个塞得鼓鼓的沙发垫。并且它在另一个现实里，所以，嗯，转移是真的。 #转移[话题]# #shifting[话题]# #自行避雷[话题]#", "liked_count": "227", "collected_count": "67", "comment_count": "1", "share_count": "8", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111549/432af714f8e506a93096943a257237df/1040g2sg31mjjroju4q705n2sa6gm6irddi81bc0!nd_dft_wlteh_webp_3']", "tags": "['转移', 'shifting', '自行避雷']", "uploa 所感知到的东西影响你的想象行为 只要你在想象中给自己想要的一切，你就无需担心外部世界。唯一重要的现实是你头脑中的那个。一旦你的心智被这种信念彻底浸润，你的状态就会改变，从而导致外部世界随之改变 那么，这和转移有什么关系呢？ 要用假设法则来转移，你只需要应用同样的逻辑： 1接受你已经在想象中到达了 这意味着白日梦般地幻想你的 DR，整天不断地自我暗示你已经在那里，去体现你的 DR 自我，去思考他们会思考的内容。完全允许自己在想象中自由，而不是把它当作幻想。要把它接受为你的真相。 2忽视 3D，并持续坚持 如果一次尝试后你在 CR醒来，就不要认同它。因为你已经在想象中到达 DR，所以你所感知到的并不重要。每当你想到转移时，只需回到 DR 的想象中，与 DR 的自我认同。这会改变你的存在状态，从而引导你完成转移。 “这难道不意味着转移不是真的？” 那你先定义一下“真实” “当然，这一切都发生在你的脑海里，哈利。但为什么这就意味着它不是真的呢？” 许多转移者都有限制性信念，这就是为什么大家总是重复问一些自己早就知道答案的问题。如果你真的想转移，为什么还抱着内心的恐惧？放下你的怀疑、问题和担忧。不要再抗拒你的 DR，只要允许自己在那里。无论是不是想象，如果在那里你感到快乐，你又有什么损失呢？最终，只要你在想象中已经在那里，它就别无选择，只能映射到这个现实里。别再把自己困在这里。允许自己去感受，哪怕仅此一次，让自己在内心里真切地在那里，而不再执着于缺乏。 “你已经是你想要成为的样子，而你拒绝相信它，是你看不见的唯一原因。” “一个假设，即使是错误的，只要坚持下去，就会变为事实。” ——内维尔 真正理解这些话。这就是你转移所需要的一切。不要把它复杂化。只需在想象中身处那里，并停止抗拒它", "liked_count": "526", "collected_count": "317", "comment_count": "23", "share_count": "29", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111549/5d6a14527d81a36ac465afd6b74a92a1/1040g2sg31m9e6klfl04g5n2sa6gm6irds919a38!nd_dft_wlteh_webp_3']", "tags": "[]", "upload_time": "2025-09-11 12:31:32", "ip_location": "未知"}, {"note_id": "68c24e3f000000001d007aba", "note_url": "https://www.xiaohongshu.com/explore/68c24e3f000000001d007aba?xsec_token=ABVLKAA49bCjU3ZZIpVMAJrwChToy49-HbEke7dKQ_Zng=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "Shifting分心法", "desc": "（cr：luckykiwiii101） 首先，要知道虚空是真实存在的！！！我在几个小时前第一次有意进入了它！😭 它就像你在非常疲倦时入睡一样，当你真的很放松时，就能进入虚空。根本不可能失败。 步骤 1：找一个舒服的姿势。 步骤 2：进入 α 波状态，可以用引导冥想，也可以不用。我喜欢不用的方式，就是在脑海里从 12 数到 1，同时把数字在脑中可视化。然后再从 13 数到 1，但这次不需要可视化。这能让你进入 α 波状态。（你不一定要完全进入 α 状态，但这很有帮助，只要非常放松就行。） 步骤 3：我知道很多人会告诉你在这个阶段要为虚空做自我暗示，但是你需要的是分心！！！在脑海里想象一个场景，让它分散你的注意力。你甚至可以在脑中播放你最喜欢的歌曲（注意，是脑内播放，不是真的开音乐）。你可以分开做，也可以同时做。这样你就会彻底被分散注意力，不再专注于三维世界。然后你就会进入虚空！砰！搞定。结果是百分百保证的，效果好得根本不可能失 erapple） 太长不看版（但详细的还是要看图上）： 1. 躺下并让自己舒服。 2. 循环从 1 数到 100，中间穿插肯定句，直到你数错、困了，或者思想游离。像这样： 我：数 1–100 我：说几句肯定/提问式肯定 我：数 1–100 我：说几句肯定/提问式肯定 （循环直到……） 3. 坚持处在目标现实的感觉——不专注于环境或感官，只专注于感觉。感觉才是秘密。 4. 在第 2 和第 3 步之间切换，直到你进入放松的“身体睡着/头脑清醒”状态，或者干脆进入入睡前状态（如果你还没转移 lol）。 5. 从这里开始，选择你觉得合适的方式：从清醒梦转移、用肯定句、进入虚空，或者像我一样，只是感受自己在DR，说服自己——要么你已经在那里，要么你正在过去的路上。 \t 小技巧： 如何找到让你自由转的方式 你可以测试不同的技巧（肯定句、视觉化、剧本、清醒梦等等），看哪种对你来说自然。 你也可以（我超爱这个，因为它像作弊码一样）假设你已经知道什么对你有效，并让假设法引导你。换句话说，“显化”它。 注意观察你的生活，因为你已经会自由转了，你一辈子都在这么做，只是我敢保证你没注意到。注意你自己，比如你多容易进入入睡前恍惚，你的梦境记忆如何，你的直觉多强，也许你把太多情绪投入到某个你不想要的场景里，它却自然显化了，类似的情况。注意那些让你心里冒出“咦，好奇怪”的东西。 \t #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "909", "collected_count": "625", "comment_count": "17", "share_count": "80", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/bdb9513e583b737ea9fbc4734c5248be/1040g2sg31m89vn2vks8g5n2sa6gm6irdab0s43o!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/12b5247fbc342f97ddbb6b0acc90b996/1040g2sg31m89vn2vks7g5n2sa6gm6ird9jdaagg!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/fea89c2c5b28ce2bf9a2875774acaa21/1040g2sg31m89vn2vks705n2sa6gm6irdk3f8vs8!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/d2c2955432e42316db6bd7e5575dec9d/1040g2sg31m89vn2vks805n2sa6gm6irdne71p9g!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-09-10 15:22:17", "ip_location": "未知"}, {"note_id": "68bfd3eb000000001d00b2b1", "note_url": "https://www.xiaohongshu.com/explore/68bfd3eb000000001d00b2b1?xsec_token=ABvpicMIR28cfKf3hcHgqerNewseQAn5te5QdGOlVuD2E=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "我是如何靠nondualism 夜夜随心清醒梦的", "desc": "（cr：fae-kissed） 我现在几乎可以随时按需清醒梦，这都归功于“非二元论” \t 当然，非二元论并不是一个获取你想要之物的工具，但它的教义确实能帮助你注意到那些你本来毫不费力就在做的事情。而对我来说，就是这样发生的。 \t 声明：我只会谈论我个人的经历，为什么某些事情会奏效或不起作用，这不在我的掌控范围内。自己去读书，自己去学习非二元论，你会得出属于你自己的结论，不管是好的还是坏的。 \t 大概一两周前，我翻开了那本《I Am That》（Sri Nisargadatta Maharaj 的著作）。我记得里面有一句话，大意是“当你睡觉时，你会忘记身体”。这句话让我印象很深，盘旋在我脑海里好几天。对我来说，睡眠一直是个很好的、也很有趣的方式，用来检验书里讲的内容。 \t 背景说明：我几乎一生每天都会做非常清晰的梦，但我从来没真正能控制过梦境的场景，也没能看到梦境是如何在我周围形成的。另外，我几乎总是会在凌晨 1 点到 3 点之间醒来，但即便如此，我从来没有清醒梦过，从未有过。 \t 那天晚上也很普通。就像平时一样，我醒来上厕所，回来继续躺下。可那句“当你睡觉时，你会忘记身体”的话又浮现出来，于是我想：“算了，干脆试试吧。”我照常放任思绪飘荡，尝试去忘记自己有一个身体，尝试只知道梦境和那些在我周围随机浮现的画面。 结果，它奏效了。 \t 只要我一想到“身体”（那个正在床上睡觉的身体），梦境就变得不那么清晰；但一旦我不再想它，梦境立刻变得清晰。我反复测试了几次，直到最后决定完全忘掉身体，彻底沉浸在梦中。梦境就完整成型了，我在做梦。我能改变场景，但很快就觉得无聊，不想维持清醒，于是又回到了普通的梦里。 \t 接下来的几天，我一次又一次重复这个过程，结果始终如一。太疯狂了，但又感觉自然和正常，因为——睡觉本来就是自然和正常的。我很清楚，如果我有压力，它就不会成功，所以我只是按平时的方式来做，它就一直有效。偶尔“失败”，只是因为我懒得去维持清醒梦。但当我真的想要时，我就能做到。 \t 所以……这就是我的经历分享 #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "277", "collected_count": "115", "comment_count": "4", "share_count": "14", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/6a8cdda67a38823d5c6fcdd8141eb0af/1040g2sg31m70m65m4q705n2sa6gm6irdo0d4jto!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-09-09 15:14:51", "ip_location": "未知"}, {"note_id": "68bec444000000001c035128", "note_url": "https://www.xiaohongshu.com/explore/68bec444000000001c035128?xsec_token=ABmWLQJTyDFel2FGVlIXlSR4IkO99iAKLmto4dkX7OINM=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "不算转移方法，但让我秒转了", "desc": "（cr：cloverapple） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "242", "collected_count": "100", "comment_count": "8", "share_count": "25", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/a5a828e24ef29ba0d971052929ac1618/1040g00831m5t1vv04s205n2sa6gm6ird92hn0p8!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/060e904e250a817a6883250c69d12689/1040g00831m5t1vv04s1g5n2sa6gm6ird5qdahng!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/3a484bb9105bc600d4b1f7b2ad2e2649/1040g00831m5t1vv04s105n2sa6gm6irddfv6j68!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/6c5f178a70e38b9fd3d738a3b3d08a0b/1040g00831m5t1vv04s0g5n2sa6gm6irdssempe8!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-09-08 19:55:48", "ip_location": "未知"}, {"note_id": "68beafcb000000001c03f446", "note_url": "https://www.xiaohongshu.com/explore/68beafcb000000001c03f446?xsec_token=ABmWLQJTyDFel2FGVlIXlSR4kj-WjwRDNOYVb2DtXR4iM=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "在CR醒来≠转移失败 转移没有失败一说", "desc": "（cr：suckerpuuunch） 我知道我老是反复强调这一点，但只要你说你已经转移了，那你就真的转移了。任何相反的暗示都是过时的、虚幻的，而且完全无关紧要。如果你说你在你的DR里，并且假设那是真的——即使你周围的一切都在告诉你并非如此——很快，你周围的一切都会跟上。感知是你创造的。一切都来自于你。每一次你“尝试”转移，你其实都已经转移了，因为转移是瞬间的。 \t 但是，如果你说“我要转移”，然后睁开眼睛，看见自己还在CR时，就认为自己没转移……那就又回到了原点。你丢掉了之前的假设，换成了一个新的假设。就好像你已经下了订单、包裹已经发货了，但你却把订单取消了。 \t 那要怎么避免这种情况呢？怎样才能不再被3D/感官所显示的东西牵制？ \t 第一，放下“转移只能在晚上、躺下、闭眼时发生”的想法。那并不是真的。是的，这些条件对一些人来说可能有帮助，因为减少了一个感官输入，但你并不真正需要它们。像大多数事情一样，这完全是可选的。你可以在晚上做完整套的转移流程，醒来时仍然看到现实时——但只要你坚持假设，3D随时都能追上来。 \t 第二，要明白“醒来看到CR时”并不代表你失败了。别再睁开眼看到同一个天花板就感到失望了。这。根本。没。有。意。义！你是创造现实的人，对吗？你是觉知/意识/灵魂/或者你相信的任何东西，对吗？那你就不是身体本身。那为什么要听从它说的？为什么要把权力交给它来决定你的感知？ \t 让3D保持它原本的样子吧——它只是一个延迟的镜子，而不是绝对的权威。你已经假设过了，你该做的已经做完了。这就是法则。其他一切都无关紧要。你可以去做十步的华丽流程，也可以只宣告一句：“我现在就在我的理想现实里。场景正在追上来。” 就这样。没有讨价还价，没有乞求。带着这种假设去生活。 么么哒 (づ￣ ³￣)づ #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "471", "collected_count": "213", "comment_count": "6", "share_count": "23", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscd 你：做术能让你转移 真相是：术只是工具，你可以用，也可以不用。让转移发生的是你而不是方法 \t 他们告诉你：有些人不能转移 真相是：人人都能，而且人人都在做。你的思想与行动塑造着各种现实 \t 他们告诉你：把自己变老/变年轻是不对的 真相是：在那个现实里，你本来就是那个年龄。而你的心智也会自然符合那个年龄的状态 \t 他们告诉你：永转是不可能的 真相是：没有哪个现实比另一个更特别。甚至永远待在这里也可以叫永久转移。你完全可以选择永远觉知你的 DR，而不是这里 \t 他们告诉你：必须不在乎你的 CR 才能转移 真相是：我们不是植物。你完全可以对两个现实都有各种情绪，同时依然可以转移到你的 DR \t 他们告诉你：休息会毁掉你的转移进程 真相是：转移不是会“消失”的过程，就算你三个月不尝试也不会怎样。想休息就休息 \t 他们告诉你：你会有转移卡点 真相是：根本不存在。因为你转移的是觉知，你完全可以觉知到自己没有所谓的“卡点”。没有任何东西——物理的、精神的、心理的、甚至天文层面的——能阻止你转移 \t 他们告诉你：重生（不记得这个现实）是不好的 真相是：才不是呢（笑死）。又不是你在这里的身体会蒸发掉 \t 他们告诉你：转移很复杂 真相是：转移的复杂程度由你决定，因为规则是你制定的。你想让它复杂化可以，想极度简化也可以 \t 他们告诉你：你必须和 DR 有连接才能转移过去 真相是：除非你是蓝牙，不然不需要 #转移[话题]#", "liked_count": "542", "collected_count": "239", "comment_count": "19", "share_count": "26", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/8f4633c978e92c157335aa6b8ee878af/notes_pre_post/1040g3k831lh71ssg4q7g5n2sa6gm6ird6p96gj0!nd_dft_wgth_webp_3']", "tags": "['转移']", "upload_time": "2025-08-23 17:48:06", "ip_location": "未知"}, {"note_id": "68a9847f000000001d0116ed", "note_url": "https://www.xiaohongshu.com/explore/68a9847f000000001d0116ed?xsec_token=ABqgnnPR3cu7R62NVevHCVF8EdVBtvlcGC6x-8fPEaMK4=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "太玄功（转载自宇宙之铁吧）", "desc": "《太玄功》，英文名为 Senses Initiated Lucid Dream(SILD)，意译为“通过感官引发的清醒梦”，是目前已知的门槛最低、效率最高的清醒梦技术之一。通过简单的几组动作，即可实现清醒入梦（WILD）、出\\体体验（OBE）、增加梦中知梦（DILD）机率的效果 \t （搬运人：我用这个方法OBE过很多次！一定要WBTB之后用不然无效，强推！）", "liked_count": "964", "collected_count": "904", "comment_count": "95", "share_count": "125", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/6142d32bc66f9aab793e9b231f7577cb/1040g00831lh71sse4s1g5n2sa6gm6ird4kqfoo8!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/209230b551aeac2efff2710ef4d23f7d/1040g00831lh71sse4s005n2sa6gm6irdo1lprjo!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/0996f63279f6f169044dc5b00b0ebfaa/1040g00831lh71sse4s0g5n2sa6gm6irdlqg20so!nd_dft_wlteh_webp_3', 'http://sns-webpic-qc.xhscdn.com/202605111550/ac42094b79f58c15a32823d7e39d45a8/1040g00831lh71sse4s105n2sa6gm6irddeprtbg!nd_dft_wlteh_webp_3']", "tags": "[]", "upload_time": "2025-08-23 17:06:07", "ip_location": "未知"}, {"note_id": "68a832bb000000001d014942", "note_url": "https://www.xiaohongshu.com/explore/68a832bb000000001d014942?xsec_token=ABDjoPl1Qw0zp7rljeIViWeru8i5Oxvxm0s0-C3j3Mvmw=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "休把客衣轻浣濯，此中犹有帝京尘", "desc": "我希望能提供更优雅的东西：一瓶药水、一段咒语、一场数百次的仪式。但我没有。我只有假设。不是表演式的假设，而是私密而坚定的那种。那种从不眨眼的假设。那种在土地上插下旗帜，说“这是我的，因为我说了算”的假设 \t 我说我在那儿，于是我就在那儿。不是一夜之间，不是光芒万丈，而是像一根线穿过针眼，一针一针，缓慢地完成。我把空气当作见证，对它说我的 DR 真实存在。我告诉寂静。我告诉手里的牙刷、掉在地上的牙膏盖、浴室灯下扑闪的飞蛾 \t 我不必再为此而战。我不必证明自己配得上。欲望不是法庭，宇宙也不是陪审团。我停止了乞求，我开始了存在。慢慢地，这个现实的脚手架就溶解了 \t 这不是信仰。信仰是你颤抖着双手捧着的东西。而这，是笃定。是静坐到河流终于认出你的名字。是明白转移不是一扇等你解锁的门，而是一间你早已住过的房子。家具还记得你的重量，墙壁仍回荡你的声音。 我能转移，是因为我记起来了 \t 而且我不断记起。哪怕觉得愚蠢，哪怕很痛，哪怕论坛里的女孩叹息，写剧本的女孩哭泣，怀疑者说我迷失在幻想里。也许我确实如此。但每个人都活在幻想里，只是有些人选择更糟的版本 \t 我知道的是：你也能到达那里。你没有被诅咒，你不是例外。当你停止“表演”信念，开始“栖居”在信念里，就像住进一所房子，穿上一层皮肤，继承一份遗产，你就会明白 \t 它不远。它就在旁边。它与你同在。它就在怀疑的帷幕之后，等待被唤出，像一个原本就属于你的名字。 你不需要特别。你不需要被选中。你不需要天空的声音或一颗坠落在你脚下的星辰。你只需要决定。安静地，每天，都像刷牙一样平常，像喂狗一样日常，像世界上最普通的奇迹 \t 让它如此简单。让它如此平淡。你从来就不需要去“赢得”它。你只需要记起它。只需要张开双手，发现自己一直握着钥匙 \t 去假设吧。不带恐惧，而是带着温柔。不带饥渴，而是带着回家的心情 \t 如果你还不信，那就先假装。不是出于绝望，而是出于敬意。表现得好像你已经在那儿——不是为了欺骗世界，而是为了调频自己。现实不会回应慌乱，它回应的是“在场” \t 所以就说这牙刷是你的。就说空气闻起来不一样。就说麦片更甜。就说光更暖。就把你的名字说得更笃定一点。你不需要证据，你就是证据 \t 不要再问“怎么做“”什么时候”，而是问“我是否准备好走进那扇我一直用双手死死抵住的门？” 因为家门开着，灯亮着，你的座位是温的，桌子上刻着你的名字 快回家吧 #转移[话题]#", "liked_count": "228", "collected_count": "74", "comment_count": "31", "share_count": "9", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/8f0537765f1004b7415e1eb97cf19492/1040g2sg31lftaco0l27g5n2sa6gm6irdrrvfsco!nd_dft_wlteh_webp_3']", "tags": "['转移']", "upload_time": "2025-08-22 17:04:59", "ip_location": "未知"}, {"note_id": "68a830ff000000001d00d371", "note_url": "https://www.xiaohongshu.com/explore/68a830ff000000001d00d371?xsec_token=ABDjoPl1Qw0zp7rljeIViWerf9wXmL_tRFduDB8wF2IfM=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "汉江明月照归人，万里秋风一叶身", "desc": "我们一直都在回家的路上。 \t 是的，我确实转移过，不止十次——如果你是那种把奇迹当作火柴根，或者刻在床板上的痕迹来数的人。但我不是。我不会把我的奇迹像债务一样一一清点。它们到来时并不是胜利，而是归返。熟悉的感觉。就像一首我几乎忘掉的歌，直到有一天又在梦里不经意地哼出来。 \t 我不在乎你是否相信我。我这么说没有半点恶意。因为信与不信，从来不是真理的前提。你不需要鼓掌，月亮也会升起；你不需要鞠躬，海洋也会把你卷入。现实从不索要掌声。它只是存在。 \t 我是在四年后才转移的。四年里，我总觉得自己是不是以某种精致、宇宙般的方式坏掉了——裂口刚好够让我渴望，却永远不够让我拥有。四年里，我收集每一种方法，就像收集贝壳，把它们贴在耳边，倾听“家”的回音。有时听见的是杂音，有时是血液的脉动，有时什么也没有。 \t 有些夜晚，我以为自己撑不到天亮。我这么说得尽可能轻，不是为了博取怜悯，而是因为这是真的。我说的不是所谓“灵魂的暗夜”，而是真实的黑夜——身体静止，心灵却在疯狂抓挠墙壁，哀求着一扇窗。那时，转移不是什么灵修爱好或逃避现实的幻想，而是救命稻草。一根丢进深坑里的绳子。 \t 如果那时我没有去相信，我不知道自己会成为什么样的人。不是那种光辉的信念，不是漂亮的信念，而是破碎的、丑陋的信念。那种只能爬行的信念。那种只能喘息着祈求：“求你了，让我在别的地方醒来。” \t 所以当我说我转移过时，我不是随便说说。这不是一个小把戏，而是一场复活。 \t 安静的，不是电影般的，不是命运的惊雷。它就像清晨到来——缓慢，但忽然之间。我记得自己那晚睡在房间里，裹着一件糟糕的旧帽衫，空气里弥漫着遗忘的气味。然后，就像一口我不知道自己屏住的气被呼出：我在那儿。不是将要去，不是渴望去，不是某天也许会去。我在。现在。这里。而且在那里。 \t 那并不像魔法。它更像是选择了“神”，即使你不知道神是谁。像是允许自己在水上行走，不是因为容易，而是因为另一种选择是溺亡。 \t 那种假设不是喧嚣的，而是低沉的嗡鸣，像一条贯穿万物的低音线。而当我调准频率时，世界弯曲了——不是来侍奉我，而是来迎接我。好像它一直都在试着这么做。 \t 我就是这样到达的：我假设我已经在那里。我运用了假设法则。 （字数限制，下篇继续。转载自Tumblr的hrrtshape） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "156", "collected_count": "46", "comment_count": "5", "share_count": "8", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/98e941e91312730cd5947c7 cation": "未知"}, {"note_id": "68a7ed78000000001d00195f", "note_url": "https://www.xiaohongshu.com/explore/68a7ed78000000001d00195f?xsec_token=ABBkLuEAMkW36sx7fw0PpBSuCtMhjHRo7YJS0GtIAlTiM=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "入睡，并意识到你一直在DR", "desc": "你好呀，欢迎回到 hrrtshape 的“反方法”解释时间，她的统一大理论是：“哦，等等，我一直都在DR”，她的领悟是——你其实从来没有离开过。 所以！！！当你问我如何“使用”我的反方法时，你其实在暗示必须要做术。但事实是——没有。 相反，有的是要放下的事。要遗忘的事。要像丢掉坏习惯、无用的念头、或本该十五分钟前就落幕的戏剧最后一幕那样，把它放下。 问题不是“如何到达那里”。问题是——你以为自己还没在那里。 请替我想象一下：你在一列火车上。 可是，剧情反转——你忘了自己早就上了车。你坐在那儿，鼻子贴着窗户，拼命查地图，焦急地想知道车站在哪，什么时候才能抵达。 但火车一直在行驶。它一直在行驶。行驶得如此平稳，以至于你甚至没察觉。 而现在？？？现在你只需要抬起头，看看窗外的风景。 “睡眠法”之所以是最简单的方式，就是因为睡眠本质上就是一种臣服。你可以尽情追逐它，但最终，它会拉住你的手腕，把你带走。 所以诀窍在于，这个优雅的转身，这个最后一秒的心灵舞蹈，就是：别追逐，只接受。 不要想着“靠入睡来转移” 不要把睡眠当作桥梁 睡眠不是桥，睡眠是河流。 而你，早已身处河中。你不需要渡过去；你只需要停止挣扎，让它带着你走。 这意味着……你上床。你像平常入睡时那样做任何事——没有“我做得对吗”的怀疑，没有过度分析，没有屏住呼吸、咬紧牙关的期待。 就是睡。就像你每天晚上做的那样。 而且，不要把睡眠当作必须把你送到某处的工具，而是把它当作一个证明：你早已在那里。因为你就是。你一直都是。 如果你的大脑又开始那一套：恐慌、紧抓不放、陷入“万一我做错了怎么办”的漩涡，那就温柔但坚定地提醒它：没有什么会做错。 这不是需要解开的谜题，不是需要撬开的锁，不是需要聪明答案的谜语。 你就是答案。你就是目的地。你已经在列车上了。 诀窍不是“如何到达那里”。 诀窍是——记起你从未离开。 （转载翻译自tumblr的hrrtshape） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "281", "collected_count": "121", "comment_count": "7", "share_count": "12", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/24793091e6b728592bbcbc670c54ddaf/1040g00831leh627c4u105n2sa6gm6irda31se58!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-22 12:09:28", "ip_location": "未知"}, {"note_id": "68a6c365000000001d010f6d", "note_url": "https://www.xiaohongshu.com/explore/68a6c365000000001d010f6d?xsec_token=ABQxa6xBvhKvGpPO3B1mmQ9NojwrzTDD5cPdpPf9GJFnQ=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/pr 觉得自己好像在假装，也不是真的假装。那种感觉只是你的大脑在努力跟上 就像你第一次学骑没有辅助轮的自行车时，你可能觉得自己在假装保持平衡，摇摇晃晃，但实际上你已经做到了。你在骑车。你的肌肉懂了，你的身体也懂了，只是你的头脑还在落后：“等等，我们真的在做这个吗？天哪” 转移也是一样。你不是在“假装”在 DR 中，你只是慢慢习惯它已经如此真实且简单。 如果你以“已经在那里的视角”（所谓“假装”）去觉察自己在 DR 中的觉知……那你就是在 DR 里。 哪怕你睁眼看到的是 CR，那也是幻象，明白吗？就是这么简单。只要“假装”你已经在 DR。但再强调一次：这不是假装。记住这一点 “假装”在 DR 中根本不存在！ 没有这种事。说真的，那究竟该是什么意思呢？？ 如果你说自己在“假装”在 DR，那其实就是你在想象自己已经在那里，对吧？你会想：在那里是什么样子？你会做什么？你在哪里？而且是以“已经在那里的你”的视角来想——这其实就是你在觉察你的 DR。 你不会“假装”去觉察。你不会“假装”去感知。如果你在做，你就是在做。这就像说：“呵呵我在假装注意到红色。”不，你就是在注意红色。结束。 \t （字数限制评论区继续） \t （转载自Tumblr的cloverapple） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "322", "collected_count": "156", "comment_count": "5", "share_count": "15", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/fda873be27942ffbfbb1126521093287/1040g2sg31ldb02a14u8g5n2sa6gm6ird7237kfo!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-21 12:12:52", "ip_location": "未知"}, {"note_id": "68a5977f000000001c03fc7d", "note_url": "https://www.xiaohongshu.com/explore/68a5977f000000001c03fc7d?xsec_token=ABVcwyLSFnUybZOMMfmmlRdodtzAc4JKHW9ngwgkFMSRw=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "我是如何在五分钟内进入虚空的", "desc": "补充说明： 如果这个方法对你没起效——虽然我真心相信它会对某些人奏效——那也别气馁。我分享这么多方法的原因就是：我真的相信每个人需要的东西不同。对我来说，转移的核心始终一样： 你只是意识，你只需观察你所想要的现实，直到其他一切选项都崩塌。 但如何进入这个核心，是非常个人化的。对我有效的方法，可能对你不行；对你有效的，可能对我不行——这没问题。 所以我才一直提供不同的方法——不是为了让你困惑，也不是推翻我之前说的，而是为了给你更多的路径，去意识到你本来就有的力量。某个方法感觉不对，那就换另一个。我的主方法还是我的首选：观察自己在DR中的意识，存在于那里，决定我就在那儿——不然我还能在哪儿呢？？——但我喜欢提供更多的选择，因为可能下一个方法才是对你真正有用的那个。 补充：（刚想到的）不要给任何方法设定“时间预期”。这次对我来说不到5分钟就起效，但下次可能要10分钟，20分钟，谁知道呢。所以如果你试了，没有立刻按照你预想的方式成功，不要慌。深呼吸，继续试。总会发生点什么的。相信我。 （第三部分，转载翻译自Tumblr的cloverapple） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "240", "collected_count": "107", "comment_count": "11", "share_count": "6", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/9df8f32010803697b3d264b1c3a72570/1040g2sg31ldb02a14u805n2sa6gm6irdhnqoj20!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-20 17:38:07", "ip_location": "未知"}, {"note_id": "68a59691000000001d015a46", "note_url": "https://www.xiaohongshu.com/explore/68a59691000000001d015a46?xsec_token=ABVcwyLSFnUybZOMMfmmlRdpblu6NrbbNtYhzrBYubgsg=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "我是如何在五分钟内进入虚空的 （2）", "desc": "具体步骤： -平躺。（我个人喜欢平躺，但侧躺也试过，也行。随便。别想太多，这不重要） -你可以动。但动了也别在意。接下来你很快就不会再关注身体了，它自然会麻木。这里的态度就是：“不重要，随便。” -现在：注意你眼睛后方的黑暗。就只是那个黑色。别试着注意“意识”本身。只管盯着黑暗。看它，真的看它。看。一次次地选择重新聚焦它。反复“睁大”你的眼睛，然后再专注回黑暗。这样会让你保持清醒，但不是强迫，而是自然而然的——因为你是真的在“看”眼睛后的黑色 -你的身体会想睡着。别抗拒，也别管它。只要你看着黑暗，你就不会真睡过去 -你保持心神锁在那个黑色空间上，就像看电影屏幕，但还没开始放。接着会怎么样？你会不断想睡着——但每次睁大眼睛、重新注视黑暗，又会被唤醒。于是你就在这种临界地带徘徊，心里想着：“管它呢。管它呢。老子要做就做。管它呢。不在乎。” （这里说的“睁大眼睛”，即便眼睛闭着，也别像要睡着那样放松，而是保持警觉，好像在黑暗中想看清什么。不是紧绷，而是一种张开的感觉，就像透过眼皮凝视。） \t 接着会发生什么： 突然你会感觉到自己的“意识”。你现在只剩下意识了。这是自然发生的。不是一开始刻意去注意，而是你忽然发现自己就是意识。为什么？因为当你像被困在眼皮后的黑色棺材里，什么都没有时，你就无处可逃，只能直面“意识”。你的身体已经麻木，周围一切都遥远、无关紧要。你会想：“等等……我只是我的意识。” 然后大脑可能又会老毛病犯：“糟了，我是不是想太多？是不是搞砸了？”这时候提醒自己：“我本来就是意识啊。我想太多也行。我是意识啊，管它呢。” 接着你会在两个状态间来回切换（因为没别的地方可去： 1.看着眼皮后的黑暗 2.注意到“意识”本身 就像房间里不断开关灯一样，你反复在两者之间切换。但别强迫它发生。你会一会儿看着黑暗，一会儿意识到自己只是意识，然后心里想：“靠，我就是意识啊。” 然后你会开始下沉。感觉到催眠幻象伸手拉着你，说：“好啦，咱去哪儿，闺蜜？” 从这时起，你可以选择： A) 顺着下沉继续，就会轻松直接掉进虚空状态。 B) 在下沉时选择清醒梦、出体，或者直接转移。要转移的话：肯定、假设、观察，随便。例如我最喜欢的方式：观察我在DR的意识，观察到“我在那里是有意识的”（就假装你在那儿，不用太费力） 重点是：接下来不管发生什么，如果发生得非常快，别慌 #shifting[话题]#", "liked_count": "1296", "collected_count": "1028", "comment_count": "103", "share_count": "92", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/87a56b45f05440f4da6e34a38ef8ca74/1040g2sg31ldb02a14u7g5n2sa6gm6ird8j9d4mg!nd_dft_wlteh_webp_3']", "tags": "['shifting']", "upload_time": "2025-08-20 17:34:09", "ip_location": "未知"}, {"note_id": "68a5948e000000001d014a4a", "note_url": "https://www.xiaohongshu.com/explore/68a5948e000000001d014a4a?xsec_token=ABVcwyLSFnUybZOMMfmmlRdtSE9JAzGNamO80xjt_h2Lg=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "我是如何在五分钟内进入虚空的（1）", "desc": "（原作者：如果有人用了这个方法没转，我真的会尖叫） 如果我没有理由，我根本不会分享这个方法，更不会冒着听起来像个疯子的风险（发了一个方法，又跑来发另一个版本）。说不清，直觉这种东西很难解释（我知道我现在听起来很疯） 但我这辈子从没这么兴奋地想分享过什么，所以这可能说明了点什么 这个方法对所有人都会有用。而且我从未对任何事这么确定过。（除了有一次我在夜里对着人行道边一只“黑猫”pspspsps，结果那是个垃圾袋，我才发现自己视力很差——但这不是重点） 这方法不算全新，其实就是我之前的方法——但被剥到最简核心，完全简化了。结果我发现这样反而更有效 （当然，如果你是那种喜欢详细、客观步骤的人，那就老老实实用我的主方法吧，别理这个） 这个方法不在乎你的信念。不在乎你的身份、自我概念、怀疑、自相矛盾。你是不是信非二元论、假设法则、吸引力法则，还是根本没什么信仰——都无所谓。这个方法根本不在乎。我敢肯定地说，因为昨晚它对我起效时，我正在哭，真的，非常抑郁。所有我平时抓着不放的东西，关于转换、意识、现实本质的那些信念，我一个都没在想。我当时已经彻底厌倦存在本身，但它依然奏效 \t 前置准备： -先明白一点：你现在眼前的“空间屏幕”——哪怕你闭上眼睛——和你的 DR（目标现实）、CR（当前现实）、虚空、梦境……都是同一个屏幕。那就是你的画布。永远如此。 -最好配合 WBTB（Wake Back To Bed，二次入睡法），所以设个闹钟，大概在睡着3小时后响。这样醒来时你会刚好有点困，容易再睡过去，但又能保持一点点意识。（当然你也可以在入睡时直接做，我昨晚是凌晨3点醒来时做的……所以你自己看着办吧）。 记住：你进入虚空或转换的起点不是冷静、自信，而是精疲力竭。是那种“管他呢，老子要做就做”的状态。 -你可以怀疑，你可以觉得糟透了，但后续的态度是：“去他妈的，随便了”。你已经厌倦尝试，厌倦这段旅程。所以就这么做吧。Fuck it。 （第一部分，转载翻译自tumblr的cloverapple） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "548", "collected_count": "325", "comment_count": "7", "share_count": "26", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/b34b90d157aa963ab3b7daee36fe10a2/1040g2sg31ldb02a14u705n2sa6gm6irdfc73ft8!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-20 17:25:34", "ip_location": "未知"}, {"note_id": "68a56536000000001d01228a", "note_url": "https://ww .mp4?sign=42bd979003401d2d279df2d30c22bab8&t=6a062799", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/1fd543d08432305a8b8ca24f0488ffd6/1040g00831lcqjhu6ks005n2sa6gm6ird54tiqj8!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-20 09:01:42", "ip_location": "未知"}, {"note_id": "68a412f0000000001d0110a6", "note_url": "https://www.xiaohongshu.com/explore/68a412f0000000001d0110a6?xsec_token=ABI1Ee33bzIEpWIKXU-XYXGUCZagVucpkrLBhixXpuLbU=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "无标题", "desc": "“有些人不相信转移，但当我在我的dr时，我的cr才是像假的那个 我开始质疑我曾生活在这里，认识的那些人，那些度过的时光，甚至是我自己的记忆。就像是刚从梦里醒来一样。 我控制不住的在想我是不是编了个“CR”出来，这让我抓狂！甚至让我怀疑我到底转移没有？我真的离开过吗？我感觉我从出生起就在DR了。 老实说，这让我怀疑整个“从CR转移到DR”的事。然后当我回到CR，我立刻意识到转移是真的。直至今日我仍在想哪个现实才是“真的”那个，而我感觉是我的DR” #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "754", "collected_count": "302", "comment_count": "11", "share_count": "38", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/0859bdad04eda5cf51dd6215a9505c00/notes_pre_post/1040g3k831lbqighj4s105n2sa6gm6irdcetmt8o!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-19 14:00:16", "ip_location": "未知"}, {"note_id": "68a4024e000000001d013064", "note_url": "https://www.xiaohongshu.com/explore/68a4024e000000001d013064?xsec_token=ABI1Ee33bzIEpWIKXU-XYXGQAc0mSP5k_PjoOmzxuL89E=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "（2）", "desc": "而假设就不一样 \t 假设就是：你拿起来，当锤子用，不管你是不是感觉自己是个建造者 \t 我之前就被卡在这里，以为必须先“相信”才能让事情发生。以为自己必须先情感投入，先对齐“频率”，搞那些柔光滤镜似的东西。但那只会让我一直停滞在原地。信念会等待，会犹豫，会需要证据，至少需要一个好听的故事。信念会要求安慰 \t 而假设，不会。 \t 我看到很多人说他们不相信，所以觉得自己不能转移或显化。就像无休止的故事：“我想要，但我不相信它会发生。”仿佛信念才是前提。我理解，因为我们一直被这样教育：信念被当成登车的车票。但实际操作中，它并不是。信念可以让事情更好看、更诗意、更线性，但“转移并不需要信念。它需要的是假设”，而假设只在乎你能不能坚持下去。 \t 很多人浪费了好几个月，只是想“感觉”出信念，而他们真正需要做的只是停止和“假设”争论。 \t 你可以在不确定时完成转移。你可以在无聊、怀疑，甚至觉得自己荒谬的时候去显化。法则不会衡量你的信念值，它只读取你的“默认值”。而如果你的默认是“我已经在那里了”或“我已经拥有了”，哪怕你并不真正相信，哪怕觉得虚假，哪怕只是因为累了才这么说——那已经足够了。一个能带来灵感，另一个能让事情真正发生。 \t 是的，你脑子里会有个分析员的声音在说：“这不是真的，你看看你周围。”你会想听，因为我们都习惯了经验数据、习惯了理智。但你所看到的3D只是滞后的指示器，是过去的结果在继续运转。如果你非要等它给你许可才去假设，那你其实已经把引擎反过来开了。 这就像是你把权力交给了镜子，而不是脸本身。更糟糕的是，你还觉得这很“现实”。 当然，你可以使用信念。它可以在混乱时稳定你，可以是一种很棒的工具。但假设并不依赖它。 \t 假设不会因为信念没出现就停下。 \t 你可以毫无信念、没有烟火、没有“结局感”地去假设。你甚至可以一边觉得自己很傻，一边照样得到结果。法则只运转在你喂给它的主导前提上，而主导前提就是你持续坚持的东西，哪怕你只是半吊子地坚持。 这种认知其实让我有点解放，带着一点点丢脸的解放：我不需要相信任何东西，甚至不需要相信我自己 我只需要不断选择那个现实，好像它已经在图书馆的书架上摆好了。 所以，我停止了向“信念”祈祷，停止了求它牵着我的手。我开始不加修饰地假设，而就在那时，转移不再像一扇上锁的门，而变成了一扇自动门 #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "432", "collected_count": "248", "comment_count": "26", "share_count": "20", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/948db240a50e253b84ef1bb256705efb/1040g00831lbqig9l4u0g5n2sa6gm6irdc2i6eig!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-19 12:49:18", "ip_location": "未知"}, {"note_id": "68a401bc000000001d008903", "note_url": "https://www.xiaohongshu.com/explore/68a401bc000000001d008903?xsec_token=ABI1Ee33bzIEpWIKXU-XYXGayAm803h_qRToDdfXE9mYA=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "（1）", "desc": "过去几个月里，我对转移的理解方式有了点转变。没开玩笑。这个问题在我脑中盘绕，就像洗衣服，湿的假设，干的信念，而潮乎乎的逻辑则挂在我脑子里的暖气片上晾着。最后我意识到：它们不是一回事。 \t 它们甚至不在同一颗星星的轨道上。它们或许都待在显化的范畴里，但绝对不坐在同一张桌子上。我认为，信念是一种情绪，一种资源，一种情绪流动性，你可能有也可能没有，但它并不是必需 \t 就像你开车——你不需要爱上引擎才能到达目的地。同样，你也不需要信念来把某个东西假设进现实。信念也许会让旅途更漂亮、更顺滑、更有叙事感，如果你喜欢这样的话，但它既不是汽油，也不是钥匙 \t 信念是粘性的。它有气味，有节奏，有一套你在疲惫、失望，或快要放弃时会反复回到的个人神话。信念有模式，它是随着时间构建的。你会去试探它，然后在它证明可靠时捡起它。人们总在试着强化信念，就像信仰、像自信、像肌肉，担心世界再次变糟时能依靠它。它可以是情感化的，但往往披着理性的外衣。它有逻辑，有前提。很多人努力去相信，只是因为害怕如果不信就会显得愚蠢。就像说：“只要我多相信一点，转移就会发生，显化就会实现，这样我就不用面对自己错看现实的尴尬。”于是，信念变成了一种防御措施，一种保险，但它并不是在做真正的重活 （转载翻译自汤不热hrrtshape，新号emmanation） #shifting[话题]# #转移[话题]# #自行避雷[话题]#", "liked_count": "162", "collected_count": "68", "comment_count": "2", "share_count": "8", "video_cover": "None", "video_addr": "None", "image_list": "['http://sns-webpic-qc.xhscdn.com/202605111550/3ace3a5d1c0ef2bfd0780523341ebea3/1040g00831lbqig9l4u005n2sa6gm6ird7momv28!nd_dft_wlteh_webp_3']", "tags": "['shifting', '转移', '自行避雷']", "upload_time": "2025-08-19 12:46:52", "ip_location": "未知"}, {"note_id": "68a2f6ec000000001c03f0fb", "note_url": "https://www.xiaohongshu.com/explore/68a2f6ec000000001c03f0fb?xsec_token=AByaKZx-kW3xzaH2kXMI5e8oZ3d3ite3AsL1wGmNtUDcI=", "note_type": "图集", "user_id": "5c5c51a10000000018034b6d", "home_url": "https://www.xiaohongshu.com/user/profile/5c5c51a10000000018034b6d", "nickname": "暴躁老鸽", "avatar": "https://sns-avatar-qc.xhscdn.com/avatar/1040g2jo31t080kael6005n2sa6gm6irdp359le0", "title": "“反方法” Anti-method Q&A", "desc": "（转载自博主hrrtshape，关于反方法可以看我前两篇博文 Q：反方法中提问：“我怎么知道自己不在我的dr中？”但我们看到的是这个现实，而不是我们想要的那个现实，这样难道不算是有证据吗？或者当我在睡前使用它时，我的体感跟在DR中会有很大不同。怎么处理这种情况？ \t A：当你说“但我能感觉到我的身体”或“我能看到我的房间”时，实际上你是在说：“我的感官正在向我报告数据，这一定意味着这是唯一真实的现实。” 但你的感官并不能证明什么，它们只是输入信息，而不是评估数据。是你的大脑在解读什么是真实的，而不是你的指尖。你的大脑是基于习惯训练的，而不是事实。 比如说，当你闭上眼睛，想象自己正在咬一块蛋糕时，你的嘴巴会流口水。这不是因为真的有蛋糕，而是因为你的大脑填补了空白，身体也做出了相应的反应 \t 或者你想象一个场景，自己的妈妈去世了，突然你就扑进枕头里哭泣，好像刚接到电话一样。你感到内疚、恶心、悲伤，情绪崩溃。其实你只是编造的，它并没有发生 \t 或者你从一场关于被追赶的噩梦中醒来，满身是汗，急着检查门锁，胃部紧绷。但事实上，什么都没有追赶你。你的大脑只是告诉你这是真的，然后你的整个系统就跟着反应。很快你才意识到你并没有处于危险中 \t 又或者你开始回忆和某人的争论，重新叙述他们的话时稍微有点尖刻，自己说的话则变得更有正义感，结果你的胃开始翻腾，身体颤抖，想要大声喊叫。其实他们并没有那样说过，你的大脑只是在让虚构的故事继续下去 \t 大脑有一个模式匹配机制，它会围绕着预期建立情境，而不是根据实际发生的事情。 所以当你说“我感觉到的是我的床，而不是我的DR身体”，这其实只是意味着你的大脑仍在运行原来的模式。但这个虚构的故事也可能是错的。大脑常常是错的。我们在REM周期黄粱一梦。我们有从未发生过的记忆。我们在寂静的房间里幻听到自己的名字。我们             { bg: ['#06B6D4', '#0891B2'], text: '#FFFFFF', accent: '#CFFAFE' },
            { bg: ['#84CC16', '#65A30D'], text: '#FFFFFF', accent: '#ECFCCB' },
            { bg: ['#1A1A1A', '#374151'], text: '#FFFFFF', accent: '#9CA3AF' },
            { bg: ['#EC4899', '#BE185D'], text: '#FFFFFF', accent: '#FBCFE8' },
        ];
        
        function generateTextCover(title, noteType, index) {
            const canvas = document.createElement('canvas');
            canvas.width = 600;
            canvas.height = 600;
            const ctx = canvas.getContext('2d');
            
            const palette = PALETTES[index % PALETTES.length];
            
            // 背景渐变
            const grad = ctx.createLinearGradient(0, 0, 600, 600);
            grad.addColorStop(0, palette.bg[0]);
            grad.addColorStop(1, palette.bg[1]);
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 600, 600);
            
            // 装饰圆圈（右上角大圆）
            ctx.beginPath();
            ctx.arc(520, 80, 160, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.08)';
            ctx.fill();
            
            // 装饰圆圈（左下角）
            ctx.beginPath();
            ctx.arc(80, 520, 120, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.06)';
            ctx.fill();
            
            // 装饰小圆点
            ctx.beginPath();
            ctx.arc(480, 480, 60, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fill();
            
            // accent 色块（左上角小方块）
            ctx.fillStyle = palette.accent;
            ctx.globalAlpha = 0.3;
            roundRect(ctx, 40, 40, 80, 6, 3);
            ctx.fill();
            ctx.globalAlpha = 1;
            
            // 类型标签背景
            ctx.fillStyle = 'rgba(255,255,255,0.2)';
            roundRect(ctx, 40, 60, noteType === '视频' ? 72 : 64, 32, 16);
            ctx.fill();
            
            // 类型标签文字
            ctx.fillStyle = palette.text;
            ctx.font = 'bold 16px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif';
            ctx.textAlign = 'left';
            ctx.fillText(noteType, 56, 81);
            
            // 主标题文字（自动换行）
            ctx.fillStyle = palette.text;
            ctx.textAlign = 'left';
            const lines = wrapText(ctx, title, 520, 36);
            const lineHeight = 52;
            const totalH = lines.length * lineHeight;
            const startY = (600 - totalH) / 2 + 18;
            
            lines.forEach((line, i) => {
                const fontSize = lines.length <= 2 ? 36 : lines.length <= 3 ? 30 : 26;
                ctx.font = `bold ${fontSize}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
                ctx.fillText(line, 40, startY + i * (fontSize + 16));
            });
            
            // 底部装饰线
            ctx.fillStyle = palette.accent;
            ctx.globalAlpha = 0.5;
            roundRect(ctx, 40, 540, 120, 4, 2);
            ctx.fill();
            ctx.globalAlpha = 1;
            
            return canvas.toDataURL('image/jpeg', 0.85);
        }
        
        function wrapText(ctx, text, maxWidth, fontSize) {
            ctx.font = `bold ${fontSize}px -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif`;
            const chars = text.split('');
            const lines = [];
            let current = '';
            for (const ch of chars) {
                const test = current + ch;
                if (ctx.measureText(test).width > maxWidth && current) {
                    lines.push(current);
                    current = ch;
                } else {
                    current = test;
                }
                if (lines.length >= 4) break;
            }
            if (current && lines.length < 4) lines.push(current);
            return lines;
        }
        
        function roundRect(ctx, x, y, w, h, r) {
            ctx.beginPath();
            ctx.moveTo(x + r, y);
            ctx.lineTo(x + w - r, y);
            ctx.quadraticCurveTo(x + w, y, x + w, y + r);
            ctx.lineTo(x + w, y + h - r);
            ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
            ctx.lineTo(x + r, y + h);
            ctx.quadraticCurveTo(x, y + h, x, y + h - r);
            ctx.lineTo(x, y + r);
            ctx.quadraticCurveTo(x, y, x + r, y);
            ctx.closePath();
        }
        
        function openModal(note) {
            const modal = document.getElementById('noteModal');
            const modalBody = document.getElementById('modalBody');
            
            let mediaHtml = '';
            
            // 显示视频封面
            if (note.video_cover) {
                mediaHtml += `<img src="${note.video_cover}" style="width: 100%; border-radius: 12px; margin-bottom: 20px;" onerror="this.style.display='none'">`;
            }
            
            // 显示图片
            if (note.image_list) {
                try {
                    const images = JSON.parse(note.image_list.replace(/'/g, '"'));
                    if (images && images.length > 0) {
                        mediaHtml += '<div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; margin-bottom: 20px;">';
                        images.forEach(img => {
                            mediaHtml += `<img src="${img}" style="width: 100%; border-radius: 8px; cursor: pointer;" onclick="window.open('${img}', '_blank')" onerror="this.style.display='none'">`;
                        });
                        mediaHtml += '</div>';
                    }
                } catch(e) {
                    console.error('解析图片列表失败:', e);
                }
            }
            
            modalBody.innerHTML = `
                <h2 class="modal-title">${note.title || '无标题'}</h2>
                <div class="modal-desc">${note.desc || '暂无描述'}</div>
                ${mediaHtml}
                <div class="modal-info">
                    <div class="info-item">
                        <div class="info-label">笔记类型</div>
                        <div class="info-value">${note.note_type}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">发布时间</div>
                        <div class="info-value">${note.upload_time || '未知'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">点赞数</div>
                        <div class="info-value">${note.liked_count || 0}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">收藏数</div>
                        <div class="info-value">${note.collected_count || 0}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">评论数</div>
                        <div class="info-value">${note.comment_count || 0}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">分享数</div>
                        <div class="info-value">${note.share_count || 0}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">IP归属地</div>
                        <div class="info-value">${note.ip_location || '未知'}</div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">标签</div>
                        <div class="info-value" style="font-size: 14px;">${note.tags || '无'}</div>
                    </div>
                </div>
                <div style="text-align: center;">
                    <a href="${note.note_url}" target="_blank" class="link-btn"><span>查看原文</span></a>
                </div>
            `;
            
            modal.style.display = 'block';
        }
        
        function closeModal() {
            document.getElementById('noteModal').style.display = 'none';
        }
        
        // 过滤按钮
        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                currentFilter = this.dataset.filter;
                renderNotes();
            });
        });
        
        // 搜索框
        document.getElementById('searchBox').addEventListener('input', function(e) {
            searchQuery = e.target.value;
            renderNotes();
        });
        
        // 点击模态框外部关闭
        window.onclick = function(event) {
            const modal = document.getElementById('noteModal');
            if (event.target === modal) {
                closeModal();
            }
        }
        
        // ESC键关闭模态框
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeModal();
            }
        });
        
        // 初始渲染
        renderNotes();
    </script>
</body>
</html>
